<!doctype html>
<html lang="{{.language}}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{.data.Title}}</title>
        <meta name="description" content="{{.data.Description}}" />
        <meta name="keywords" content="{{.data.Keywords}}" />
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@latest/dist/tailwind.min.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" />
        <link href="/static/css/styles.css" rel="stylesheet" />
    </head>
    <body class="main-content text-white" style="min-height:100vh;display:flex;flex-direction:column">

        <!-- Photo modal — outside flex flow so position:fixed covers full viewport -->
        <div id="photo-modal"
            style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
                   z-index:9999;background:rgba(0,0,0,0.88);
                   align-items:center;justify-content:center;padding:16px;cursor:zoom-out;">
            <img id="modal-img" src="" alt="Photo"
                style="max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px;
                       cursor:default;box-shadow:0 8px 40px rgba(0,0,0,0.6);display:block;" />
            <button id="modal-close"
                style="position:fixed;top:16px;right:20px;background:rgba(0,0,0,0.4);border:none;
                       color:white;font-size:2rem;line-height:1;cursor:pointer;
                       width:40px;height:40px;border-radius:50%;display:flex;
                       align-items:center;justify-content:center;">&#x2715;</button>
        </div>

        {{template "navbar-gallery" .}}

        <!-- Gallery -->
        <main id="photo-container" class="gallery-container">
            {{range .photos}}
            <div class="photo-item">
                <picture>
                    {{if .WebP}}
                    <source srcset="{{.WebP}}" type="image/webp" />
                    {{end}}
                    <img src="{{.URL}}" alt="Photo" class="photo" loading="lazy" />
                </picture>
            </div>
            {{end}}
        </main>

        <!-- Loader for infinite scroll -->
        <div id="loader" style="display:none;text-align:center;padding:2rem;">
            <span class="text-white">Loading...</span>
        </div>



        {{template "footer" .}}

        <script src="/static/js/lang-switch.js"></script>
        <script src="/static/js/menu.js"></script>
        <script src="/static/js/gallery.js"></script>
    </body>
</html>
