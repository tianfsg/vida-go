<!doctype html>
<html lang="{{.language}}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{.data.Title}}</title>
        <meta name="description" content="{{.data.Description}}" />
        <meta name="keywords" content="{{.data.Keywords}}" />
        <link href="https://cdn.jsdelivr.net/npm/tailwindcss@latest/dist/tailwind.min.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" />
        <link href="/static/css/styles.css" rel="stylesheet" />
    </head>
    <body class="main-content text-white" style="min-height:100vh;display:flex;flex-direction:column">

        {{template "navbar-gallery" .}}

        <!-- Gallery -->
        <main id="photo-container" class="gallery-container">
            {{range .photos}}
            <div class="photo-item">
                <picture>
                    {{if .WebP}}
                    <source srcset="{{.WebP}}" type="image/webp" />
                    {{end}}
                    <img src="{{.URL}}" alt="Photo" class="photo" loading="lazy" />
                </picture>
            </div>
            {{end}}
        </main>

        <!-- Loader for infinite scroll -->
        <div id="loader" style="display:none;text-align:center;padding:2rem;">
            <span class="text-white">Loading...</span>
        </div>

        {{template "footer" .}}

        <script src="/static/js/lang-switch.js"></script>
        <script src="/static/js/menu.js"></script>
        <script src="/static/js/gallery.js"></script>
    </body>
</html>
