{{define "footer"}}
<div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" preserveAspectRatio="none"
        style="display:block;width:100vw;height:100px;transform:scaleX(-1)">
        <path d="M0,40 Q300,80 600,40 Q900,0 1200,40 L1200,100 L0,100 Z" fill="#1a202c"/>
    </svg>
</div>

<footer class="bg-gray-900 text-gray-400 text-center w-full" style="padding:2rem 2rem;background:#1a202c">
    <section id="contact" class="w-full flex justify-center items-center" style="margin-bottom:0">
        <div class="max-w-4xl bg-gray-900 bg-opacity-80 rounded-lg shadow-lg p-8 text-white">
            <h2 class="text-3xl font-bold mb-2">{{.data.ContactTitle}}</h2>
            <p class="text-lg mb-4">{{.data.ContactSubtitle}}</p>
            <p class="text-base">
                <strong>{{.data.EmailLabel}}</strong>
                <a href="mailto:contact@vida.guide" class="text-yellow-400">contact@vida.guide</a>
            </p>
            <div class="flex justify-center space-x-4 mt-6">
                <a href="https://github.com/tianfsg" target="_blank" class="text-yellow-400 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2a10 10 0 00-3.16 19.49c.5.09.68-.21.68-.48v-1.7c-2.78.61-3.37-1.33-3.37-1.33-.45-1.15-1.1-1.45-1.1-1.45-.9-.61.07-.6.07-.6 1 .08 1.53 1.04 1.53 1.04.89 1.52 2.33 1.08 2.9.82.09-.65.35-1.08.64-1.33-2.22-.25-4.55-1.11-4.55-4.96 0-1.1.39-1.99 1.02-2.7-.1-.26-.44-1.3.1-2.7 0 0 .84-.27 2.75 1.03a9.58 9.58 0 015 0c1.9-1.3 2.75-1.03 2.75-1.03.54 1.41.2 2.44.1 2.7.63.71 1.02 1.6 1.02 2.7 0 3.86-2.33 4.71-4.55 4.96.36.31.68.92.68 1.85v2.74c0 .28.18.59.69.48A10.02 10.02 0 0012 2z"/>
                    </svg>
                </a>
                <a href="https://linkedin.com/in/seguro" target="_blank" class="text-yellow-400 hover:text-white transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M19 3a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h14zm-5 6a3 3 0 00-3 3v5h2v-5a1 1 0 011-1 1 1 0 011 1v5h2v-5a3 3 0 00-3-3zM7 9H5v10h2V9zm-1-1a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
                    </svg>
                </a>
            </div>
        </div>
    </section>

    <div class="container mx-auto px-4 mt-4">
        <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
            <div id="terms" class="flex space-x-4">
                <a href="/privacy?lang={{.language}}"      class="hover:text-white">{{.data.FooterPrivacy}}</a>
                <a href="/cookies?lang={{.language}}"      class="hover:text-white">{{.data.FooterCookies}}</a>
                <a href="/terms?lang={{.language}}"        class="hover:text-white">{{.data.FooterTerms}}</a>
                <a href="/legal-notice?lang={{.language}}" class="hover:text-white">{{.data.FooterLegal}}</a>
            </div>
            <div class="text-center md:text-right">
                <p>{{.data.FooterSignature}}</p>
            </div>
        </div>
    </div>
</footer>
{{end}}
