{{define "navbar-legal"}}
<header class="fixed top-0 left-0 w-full z-30 bg-gray-900 bg-opacity-90 flex justify-between items-center p-4 shadow-lg">
    <a href="/home" class="text-3xl font-bold hover:text-yellow-400 transition">{{.data.SiteName}}</a>

    <!-- Mobile menu button -->
    <div class="md:hidden">
        <button id="menuButton" aria-expanded="false" aria-controls="menu" class="focus:outline-none">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
            </svg>
        </button>
    </div>

    <!-- Nav links -->
    <nav id="menu" class="hidden md:flex flex-1 justify-center space-x-8" role="navigation">
        <a href="/"          class="hover:text-gray-300">{{.data.MenuHome}}</a>
        <a href="/portfolio" class="hover:text-gray-300">{{.data.MenuPortfolio}}</a>
        <a href="/gallery"   class="hover:text-gray-300">{{.data.MenuArt}}</a>
    </nav>

    <!-- Language switcher -->
    {{template "lang-switcher" .}}
</header>
{{end}}
